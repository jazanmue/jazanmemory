<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>الأرشيف | ذاكرة جازان</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="topbar">
  <nav class="nav">
    <a class="brand" href="index.html"><img src="logo.png" alt="ذاكرة جازان"><div><h1>ذاكرة جازان</h1><span>JAZAN MEMORY</span></div></a>
    <div class="links">
      <a href="index.html">الرئيسية</a>
      <a class="active" href="documents.html">الأرشيف</a>
      <a href="board.html">لوحة الذكريات</a>
      <a href="admin.html">لوحة الإدارة</a>
    </div>
    <div class="actions"><a class="btn ghost" href="admin.html">لوحة الإدارة 🔒</a></div>
  </nav>
</header>
<section class="pageHero pageHeroDocs"><h1>الأرشيف الرقمي</h1><p>بحث وتصنيف الوثائق والصور والفيديوهات والمنشورات التاريخية في أرشيف ذاكرة جازان.</p></section>
<main class="section" style="margin-top:30px">
  <div class="filters">
    <input id="q" placeholder="ابحث بالكلمات أو التاريخ أو المكان أو الشهود">
    <select id="typeFilter">
      <option value="">كل الأنواع</option>
      <option>وثيقة</option><option>صورة</option><option>فيديو</option><option>منشور</option>
    </select>
    <select id="catFilter">
      <option value="">كل التصنيفات</option>
      <option>أوقاف</option><option>مبايعات</option><option>ملكية وأملاك</option><option>مستندات مالية</option><option>عقود ومعاملات</option>
      <option>صور تاريخية</option><option>هوية المشروع</option><option>فيديوهات</option><option>تراث وعمارة</option>
      <option>تهامة</option><option>الجبال</option><option>الساحل والجزر</option>
      <option>إعلان</option><option>ذكريات وقصص</option><option>مشاركات الأعضاء</option>
    </select>
    <button class="btn dark" onclick="renderArchive()">تطبيق البحث</button>
  </div>
  <div class="quickFilters">
    <a href="documents.html?cat=تهامة">تهامة</a>
    <a href="documents.html?cat=الجبال">الجبال</a>
    <a href="documents.html?cat=الساحل والجزر">الساحل والجزر</a>
    <a href="documents.html?type=وثيقة">الوثائق والصكوك</a>
    <a href="documents.html?type=منشور">المنشورات</a>
  </div>
  <div class="cards archiveGrid" id="archiveGrid"></div>
</main>
<footer class="footer"><div class="copyright">جميع الحقوق محفوظة © ذاكرة جازان 2026</div></footer>
<div class="modal" id="modal"><div class="modalContent"><button class="btn dark" onclick="closeModal()">إغلاق</button><h2 id="modalTitle"></h2><div id="modalBody"></div></div></div>
<script src="data.js"></script>
<script src="main.js"></script>
<script>
document.addEventListener('DOMContentLoaded',()=>{const p=new URLSearchParams(location.search);if(p.get('type'))document.querySelector('#typeFilter').value=p.get('type');if(p.get('cat'))document.querySelector('#catFilter').value=p.get('cat');renderArchive();});
</script>
</body>
</html>
